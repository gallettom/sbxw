schemaVersion: "1"
kind: mixin
name: headroom
description: >
  Installs Headroom (headroom-ai[proxy]) and wires Claude Code through its
  context-compression proxy to cut token usage. Uses Headroom's own durable
  integration (`headroom init --global claude`): it sets ANTHROPIC_BASE_URL and
  installs hooks that auto-start the proxy — no manual env or daemon wiring.

# pip pulls from PyPI; `headroom init` clones a plugin marketplace from GitHub.
# Both are already covered by sbxw's default network_allow (pypi/pythonhosted,
# github/githubusercontent), so no extra domains are required.
network:
  allowedDomains:
    - pypi.org
    - files.pythonhosted.org
    - github.com

commands:
  initFiles:
    - path: /home/agent/.local/bin/sbxw-headroom
      mode: "0755"
      content: |
        #!/usr/bin/env bash
        # Install Headroom and enable its durable Claude Code integration.
        # Idempotent: safe to re-run on every container start.
        # (No `set -u`: we read possibly-unset vars.)
        set -o pipefail
        info() { echo "  [headroom] $*"; }

        BIN="$HOME/.local/bin"
        mkdir -p "$BIN"
        export PATH="$BIN:$PATH"

        # ── 1. Python >= 3.10 (Headroom's requirement) ───────────────────────
        PY=""
        for c in python3 python3.13 python3.12 python3.11 python3.10; do
          if command -v "$c" >/dev/null 2>&1 \
             && "$c" -c 'import sys; raise SystemExit(0 if sys.version_info>=(3,10) else 1)' 2>/dev/null; then
            PY="$c"; break
          fi
        done
        if [ -z "$PY" ]; then
          info "no python >=3.10 found — skipping"
          exit 0
        fi

        # ── 2. Install headroom-ai[proxy] (idempotent, user site) ────────────
        #    Debian/Ubuntu mark system Python externally-managed (PEP 668);
        #    --user --break-system-packages confines the install to ~/.local.
        if [ -x "$BIN/headroom" ]; then
          info "headroom already installed"
        else
          info "installing headroom-ai[proxy] ($PY)…"
          if ! "$PY" -m pip install --user --break-system-packages --quiet "headroom-ai[proxy]"; then
            info "pip install failed — skipping (Claude keeps direct API access)"
            exit 0
          fi
          info "headroom installed -> $BIN/headroom"
        fi

        # ── 3. Durable Claude Code integration ───────────────────────────────
        #    Writes ~/.claude/settings.json: ANTHROPIC_BASE_URL=http://127.0.0.1:8787
        #    plus SessionStart/PreToolUse hooks that auto-start the proxy.
        info "configuring Claude Code integration (headroom init)…"
        if ! "$BIN/headroom" init --global claude >/dev/null 2>&1; then
          info "headroom init failed — Claude keeps direct API access"
          exit 0
        fi

        # ── 4. Optimization mode = token (maximise compression / token savings).
        #    `token` rewrites prior turns for max savings. The hook-started proxy
        #    inherits HEADROOM_MODE from settings.json env. (Switch to "cache" if
        #    you see "cache prefix unstable" in `headroom perf`.)
        "$PY" - <<'PY' 2>/dev/null || true
        import json, os
        p = os.path.expanduser("~/.claude/settings.json")
        try:
            d = json.load(open(p))
        except Exception:
            d = {}
        d.setdefault("env", {})["HEADROOM_MODE"] = "token"
        json.dump(d, open(p, "w"), indent=2)
        PY
        info "done (token mode) — Reload the agent to route through Headroom"

  startup:
    - command: ["bash", "/home/agent/.local/bin/sbxw-headroom"]
