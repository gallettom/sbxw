# assets/kit.example.yaml — PLACEHOLDER, schema NOT verified.
#
# Kits are sbx's native, declarative extension point: config/tools baked into a
# sandbox at create time, and startup hooks re-run on each container start
# (idempotent, per the 0.30 release notes). A kit is the "most native" way to do
# pre-start setup such as seeding agent auth — which is what you asked about.
#
# However, the precise kit YAML schema is NOT in the sbx CLI reference, so the
# fields below are an educated sketch, not gospel. Before using this:
#
#   sbx kit --help
#   sbx kit <subcommand> --help        # inspect/init/add/etc.
#
# and adjust the keys to match what your `sbx` version actually accepts. Once you
# have a working kit, attach it at create time (confirm the flag name; the 0.28.1
# notes mention `--kit`, but it is not listed in `sbx run`'s options table):
#
#   sbx run --kit <kit-name> claude .     # verify with `sbx run --help`

name: claude-dev-kit

# Commands the kit runs. `startup` is replayed on every container start.
commands:
  startup:
    # Source an OAuth env file if the wrapper dropped one in (best-effort).
    - sh -c '[ -f "$HOME/.sbxw_oauth.env" ] && . "$HOME/.sbxw_oauth.env" || true'

# If your sbx version supports per-kit env (CONFIRM — may not exist), an env
# block like this would be the clean home for the OAuth token instead of the
# post-start shell-rc injection the wrapper falls back to:
#
# env:
#   CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
